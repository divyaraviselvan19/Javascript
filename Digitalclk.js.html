<!DOCTYPE html>
<html>

<head>
    <title>Digital Clock</title>
    <h1>Digital Clock</h1>
    <style>
        #clock {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>

<body>

    <div id="clock"></div>

    <script>
        function showTime() {
            let date = new Date();

            let h = date.getHours();
            let m = date.getMinutes();
            let s = date.getSeconds();

            h = h < 10 ? "0" + h : h;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;

            document.getElementById("clock").innerHTML =
                h + ":" + m + ":" + s;
        }

        setInterval(showTime, 1000);
        showTime();
    </script>

</body>

</html>
